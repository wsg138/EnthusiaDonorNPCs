update-interval-minutes: 10
identity-check-interval-seconds: 15
default-skin-name: "Steve"
# Select the NPC plugin used by the configured positions: citizens or fancynpcs.
# Citizens looks up numeric npc-id values. FancyNpcs accepts either its numeric ID
# or NPC name. The legacy npc-name key is also accepted for FancyNpcs.
npc-provider: "citizens"

settings:
  only-update-when-name-changes: true
  viewer-resync-delay-ticks: 20
  log-updates: true
  log-no-change: false

leaderboards:
  alltime-donors:
    display-name: "All-Time Donors"
    positions:
      1:
        npc-name: "donorboard_1"
        hologram-name: "donorboard_1_text"
        name-placeholder: "%enthusiadonors_alltime_top_1_name%"
        uuid-placeholder: "%enthusiadonors_alltime_top_1_uuid%"
      2:
        npc-name: "donorboard_2"
        hologram-name: "donorboard_2_text"
        name-placeholder: "%enthusiadonors_alltime_top_2_name%"
      3:
        npc-name: "donorboard_3"
        hologram-name: "donorboard_3_text"
        name-placeholder: "%enthusiadonors_alltime_top_3_name%"

  monthly-donors:
    display-name: "Monthly Donors"
    positions:
      1:
        npc-name: "donorboard_monthly_1"
        hologram-name: "donorboard_monthly_1_text"
        name-placeholder: "%enthusiadonors_monthly_top_1_name%"
      2:
        npc-name: "donorboard_monthly_2"
        hologram-name: "donorboard_monthly_2_text"
        name-placeholder: "%enthusiadonors_monthly_top_2_name%"
        uuid-placeholder: "%enthusiadonors_monthly_top_2_uuid%"
      3:
        npc-name: "donorboard_monthly_3"
        hologram-name: "donorboard_monthly_3_text"
        name-placeholder: "%enthusiadonors_monthly_top_3_name%"

  top-balance:
    display-name: "Top Balance"
    positions:
      1:
        npc-name: "donorboard_balance_1"
        hologram-name: "donorboard_balance_1_text"
        uuid-placeholder: "%currency_top_items_10_uuid%"
        facing: north

  top-playtime:
    display-name: "Top Playtime"
    positions:
      1:
        npc-name: "donorboard_playtime_1"
        hologram-name: "donorboard_playtime_1_text"
        uuid-placeholder: "%playtime_top_active_all_1_uuid%"
        facing: north

  top-kills:
    display-name: "Top Kills"
    positions:
      1:
        npc-name: "donorboard_kills_1"
        hologram-name: "donorboard_kills_1_text"
        uuid-placeholder: "%enthusiadonors_kills_top_1_uuid%"
        facing: north
